<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Access — OpenID Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0B1120;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(13,148,136,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(245,158,11,0.10) 0%, transparent 60%);
            pointer-events: none;
        }

        .card {
            position: relative;
            background: #1E293B;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(13,148,136,0.12);
        }

        .logo-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(13,148,136,0.35);
            flex-shrink: 0;
        }

        .logo-text { font-size: 16px; font-weight: 700; color: #F1F5F9; }
        .logo-text span { color: #0D9488; }

        .app-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .app-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 4px 16px rgba(13,148,136,0.35);
            text-transform: uppercase;
        }

        .app-name {
            font-size: 18px;
            font-weight: 700;
            color: #F1F5F9;
            letter-spacing: -0.3px;
        }

        .app-sub {
            font-size: 13px;
            color: #94A3B8;
            margin-top: 2px;
            text-align: center;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 20px 0;
        }

        .permissions-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 12px;
        }

        .scope-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .scope-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .scope-icon {
            width: 32px;
            height: 32px;
            background: rgba(13,148,136,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0D9488;
            flex-shrink: 0;
        }

        .scope-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .scope-name {
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .scope-desc { font-size: 13px; color: #CBD5E1; }

        .buttons { display: flex; gap: 10px; }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover { opacity: 0.88; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-deny {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #FCA5A5;
        }

        .btn-deny:hover {
            background: rgba(239,68,68,0.18);
            box-shadow: 0 4px 12px rgba(239,68,68,0.2);
        }

        .btn-allow {
            background: linear-gradient(135deg, #0D9488, #0F766E);
            color: #fff;
            box-shadow: 0 4px 14px rgba(13,148,136,0.35);
        }

        .btn-allow:hover { box-shadow: 0 6px 20px rgba(13,148,136,0.45); }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-bar">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="rgba(255,255,255,0.9)"/>
                    <circle cx="12" cy="11" r="2" fill="#0D9488"/>
                    <path d="M12 13v3" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="logo-text">Secure<span>ID</span></span>
        </div>

        <div class="app-header">
            <div class="app-avatar">{{.Initials}}</div>
            <div>
                <div class="app-name">{{.ClientName}}</div>
                <div class="app-sub">is requesting access to your account</div>
            </div>
        </div>

        <div class="divider"></div>

        <p class="permissions-label">Requested permissions</p>
        <ul class="scope-list">
            {{range .Scopes}}
            <li class="scope-item">
                <div class="scope-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        {{.IconPath}}
                    </svg>
                </div>
                <div class="scope-text">
                    <span class="scope-name">{{.Name}}</span>
                    <span class="scope-desc">{{.Label}}</span>
                </div>
            </li>
            {{end}}
        </ul>

        <form method="POST" action="/consent?auth_session={{.AuthSessionID}}">
            <div class="buttons">
                <button type="submit" name="consent" value="deny" class="btn-deny">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    Deny
                </button>
                <button type="submit" name="consent" value="allow" class="btn-allow">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Allow Access
                </button>
            </div>
        </form>

        <p class="footer">Your data is protected · Powered by OpenID Connect</p>
    </div>
</body>
</html>
