<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — OpenID Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #0B1120;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(13,148,136,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(245,158,11,0.10) 0%, transparent 60%);
            pointer-events: none;
        }

        .card {
            position: relative;
            background: #1E293B;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(13,148,136,0.12);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0D9488 0%, #0F766E 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(13,148,136,0.35);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #F1F5F9;
            letter-spacing: -0.3px;
        }

        .logo-text span { color: #0D9488; }

        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #F1F5F9;
            text-align: center;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #94A3B8;
            text-align: center;
            margin-bottom: 28px;
        }

        .error-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #FCA5A5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #0F172A;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #F1F5F9;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input::placeholder { color: #475569; }

        input:focus {
            border-color: #0D9488;
            box-shadow: 0 0 0 3px rgba(13,148,136,0.2);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: linear-gradient(135deg, #0D9488, #0F766E);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(13,148,136,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button[type="submit"]:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13,148,136,0.45);
        }

        button[type="submit"]:active { transform: translateY(0); }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="rgba(255,255,255,0.9)"/>
                    <circle cx="12" cy="11" r="2" fill="#0D9488"/>
                    <path d="M12 13v3" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="logo-text">Secure<span>ID</span></span>
        </div>

        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        {{if .ErrorMessage}}
        <div class="error-banner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>{{.ErrorMessage}}</span>
        </div>
        {{end}}

        <form method="POST" action="/login?auth_session={{.AuthSessionID}}">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username"
                       required autofocus autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password"
                       required autocomplete="current-password">
            </div>
            <button type="submit">
                Sign In
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>

        <p class="footer">Protected by OpenID Connect</p>
    </div>
</body>
</html>
